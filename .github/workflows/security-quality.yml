# Automated security and quality gate — runs on every push, every PR,
# and on a daily schedule. This never sleeps.

name: Security & Quality Gate

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 5am NZST (17:00 UTC previous day)
    - cron: "0 17 * * *"

jobs:
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=high || true
      - name: Check for known vulnerabilities
        run: npx audit-ci --high
        continue-on-error: true

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # This job requires GitHub Dependency Graph (GitHub Advanced Security).
    # continue-on-error prevents the entire workflow from going red when the
    # feature is not available on this repository.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
